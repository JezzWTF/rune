services:
  rune-ide-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNE_SOURCE_REVISION: ${RUNE_SOURCE_REVISION:-dev}
        RUNE_SOURCE_URL: ${RUNE_SOURCE_URL:-}
        CODE_SERVER_VERSION: ${CODE_SERVER_VERSION:-4.123.0}
        VSCODE_VERSION: ${VSCODE_VERSION:-1.123.0}
    image: rune-ide-dev:local
    container_name: rune-ide-dev
    restart: unless-stopped
    environment:
      PASSWORD: ${RUNE_DEV_PASSWORD:-rune-dev-password}
    ports:
      - "127.0.0.1:8484:8080"
    volumes:
      - "Z:/Coding:/home/coder/workspace"
